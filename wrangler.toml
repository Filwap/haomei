name = "haomei-api"
main = "worker.js"
compatibility_date = "2024-01-01"

# 静态资源目录（用于托管 HTML/JS/CSS/图片等）
[assets]
directory = "."

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "haomei-db"
database_id = "d027ab17-09c4-419e-b554-375c8f2227d6"

# ── 环境变量 / Secrets ─────────────────────────────────
# 以下敏感值建议通过 Cloudflare Dashboard 设置为加密 Secrets:
#   wrangler secret put JWT_SECRET
#   wrangler secret put ADMIN_PASS
#
# 本地开发时可使用 [vars] 明文（不要提交真实密码到 Git！）
[vars]
# JWT_SECRET = "your-random-hmac-secret-here"
# ADMIN_USER = "admin"
# ADMIN_PASS = "change-this-password"
